services:
  pixel-ui:
    build:
      context: .
      dockerfile: Dockerfile
    image: hermes-pixel-ui:latest
    container_name: hermes-pixel-ui
    ports:
      - "9090:9000"
    volumes:
      - ${HOME}/.hermes/sessions:/root/.hermes/sessions:ro
      - ./backend/presets:/app/backend/presets
      - ./data:/data
    environment:
      - HERMES_SESSIONS_DIR=/root/.hermes/sessions
      - PIXEL_UI_DISABLE_CAFFEINATE=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/api/status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
